# VOD_Auctions Admin Panel
# Serves: admin.vod-auctions.com → Medusa Admin UI (Port 9000)

server {
    listen 80;
    server_name admin.vod-auctions.com;

    location = / {
        return 301 /app;
    }

    # Discogs Import SSE endpoints — unbuffered streaming.
    # NOTE: We do NOT set an artificially-long proxy_read_timeout. The default
    # (300s) is sufficient because the backend emits an SSE heartbeat every 5s,
    # which resets the idle-timer. If a job truly went silent for >300s the
    # SSE stream is broken anyway and we'd rather fail fast.
    location /admin/discogs-import/ {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE requirements
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header X-Accel-Buffering no;

        # Larger upload buffers for big CSVs / XLSX (discogs collection exports)
        client_max_body_size 50m;
    }

    location / {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }
}

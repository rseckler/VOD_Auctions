# VOD_Auctions Backend API (Medusa.js)
# Serves: api.vod-auctions.com + vodauction-api.thehotshit.de (fallback)

server {
    listen 80;
    server_name api.vod-auctions.com vodauction-api.thehotshit.de;

    # Discogs Import SSE endpoints — long-running + unbuffered streaming
    location /admin/discogs-import/ {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE requirements
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header X-Accel-Buffering no;

        # Long timeouts for multi-hour fetch/import operations
        proxy_read_timeout 21600s;   # 6 hours
        proxy_send_timeout 21600s;
        proxy_connect_timeout 60s;

        # Larger upload buffers for big CSVs / XLSX
        client_max_body_size 50m;
        client_body_timeout 300s;
    }

    location / {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }
}
